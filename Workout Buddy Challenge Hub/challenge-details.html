<!DOCTYPE html>
<html>
<head>
    <title>Challenge Details - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
    <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="activity-feed.html">Activity</a>
        <a class="nav-link d-inline me-3" href="browse-challenges.html">Challenges</a>
        <a class="nav-link d-inline me-3" href="profile-view.html">Profile</a>
        <a class="nav-link d-inline" href="landing.html">Logout</a>
    </div>
</nav>

<div class="container py-5">
    <div id="challengeDetails">
        <div class="text-center py-5">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2 text-muted">Loading challenge details...</p>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const challengeId = urlParams.get('id');
    const currentUserId = 1; // Assuming user_id 1 matches your database
    let currentlyJoined = false; 

    async function loadChallenge() {
        if (!challengeId) {
            document.getElementById("challengeDetails").innerHTML = "<h3>Challenge ID missing.</h3>";
            return;
        }

        try {
            const res = await fetch(`/challenge/${challengeId}`);
            const challenge = await res.json();
            
            currentlyJoined = challenge.is_joined > 0;

            const start = new Date(challenge.start_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            const end = new Date(challenge.end_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

            const container = document.getElementById("challengeDetails");
            container.innerHTML = `
                <div class="card-custom">
                    <h2 class="brand-title">${challenge.title}</h2>
                    <div class="gold-divider"></div>
                    <p class="gold-accent mb-4 text-uppercase fw-bold">Difficulty: ${challenge.difficulty}</p>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <p class="mb-1"><strong>Description:</strong></p>
                            <p class="text-muted">${challenge.description}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-1"><strong>Timeline:</strong></p>
                            <p class="text-muted mb-0">Starts: ${start}</p>
                            <p class="text-muted">Ends: ${end}</p>
                        </div>
                    </div>

                    <h5 class="brand-title">Challenge Rules</h5>
                    <ul class="mb-4 text-muted">
                        <li>Log your workouts daily to maintain your streak.</li>
                        <li>Encourage teammates in the activity feed.</li>
                    </ul>

                    <button id="joinBtn" class="btn btn-lg px-5" onclick="toggleJoin()"></button>
                    <div id="statusMsg" class="mt-3 small fw-bold"></div>
                </div>
            `;
            updateButtonUI(); // Set initial button state
        } catch (err) {
            console.error("Fetch error:", err);
            document.getElementById("challengeDetails").innerHTML = "<h3>Error loading challenge data.</h3>";
        }
    }

    function updateButtonUI() {
        const btn = document.getElementById("joinBtn");
        if (currentlyJoined) {
            btn.innerText = "Unjoin Challenge";
            btn.className = "btn btn-unjoin btn-lg px-5";
        } else {
            btn.innerText = "Join Challenge";
            btn.className = "btn btn-primary-custom btn-lg px-5";
        }
    }

    async function toggleJoin() {
        const endpoint = currentlyJoined ? "/unjoin-challenge" : "/join-challenge";
        const btn = document.getElementById("joinBtn");
        const status = document.getElementById("statusMsg");

        btn.disabled = true; // Prevent double-clicks

        try {
            const res = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: currentUserId, challenge_id: challengeId })
            });

            if (res.ok) {
                currentlyJoined = !currentlyJoined;
                updateButtonUI();
                
                status.style.color = "#709770"; // Sage Green
                status.innerText = currentlyJoined ? "✓ Joined successfully!" : "Successfully unjoined.";
            } else {
                const errorMsg = await res.text();
                status.style.color = "#dc3545"; // Red
                status.innerText = "Error: " + errorMsg;
            }
        } catch (err) {
            status.innerText = "Connection error. Is the server running?";
        } finally {
            btn.disabled = false;
        }
    }

    loadChallenge();
</script>

</body>
</html>
