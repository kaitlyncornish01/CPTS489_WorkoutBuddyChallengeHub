<h2>Refund Requests</h2>
<table id="refundTable"></table>

<script>
fetch('/admin/refunds')
.then(res => res.json())
.then(data => {
    const table = document.getElementById('refundTable');

    data.forEach(r => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${r.user_id}</td>
            <td>${r.amount}</td>
            <td>${r.status}</td>
            <td><button onclick="approve(${r.id})">Approve</button></td>
        `;
        table.appendChild(row);
    });
});

function approve(id) {
    fetch(`/admin/refunds/${id}/approve`, { method: 'POST' })
        .then(() => location.reload());
}
</script>
