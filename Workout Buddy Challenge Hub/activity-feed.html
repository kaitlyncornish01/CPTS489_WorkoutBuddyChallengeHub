<!DOCTYPE html>
<html>
<head>
    <title>Activity Feed - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
        <div class="ms-auto">
            <a class="nav-link d-inline me-3" href="browse-challenges.html">Challenges</a>
            <a class="nav-link d-inline me-3" href="profile-view.html">Profile</a>
            <a class="nav-link d-inline" href="landing.html">Logout</a>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 800px;">
        <h2 class="brand-title mb-2">Activity Feed</h2>
        <div class="gold-divider"></div>
        <p class="gold-accent mb-4 text-uppercase small">See what your friends are accomplishing</p>
        
        <div id="feed"></div>
    </div>

    <div id="reportModal" class="position-fixed top-0 start-0 w-100 h-100 d-none" style="background: rgba(0, 0, 0, 0.35); z-index: 1050;">
        <div class="d-flex h-100 align-items-center justify-content-center p-3">
            <div class="card-custom w-100" style="max-width: 560px;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="brand-title mb-0">Report Post</h5>
                    <button id="closeReportModalButton" class="btn btn-sm btn-outline-secondary" type="button">Close</button>
                </div>
                <p class="text-muted small mb-3">Select one or more reasons. Add details if needed.</p>
                <input type="hidden" id="reportPostId">

                <div id="reportReasonList" class="mb-3">
                    <p class="text-muted mb-0">Loading reasons...</p>
                </div>

                <div class="mb-3">
                    <label for="reportText" class="form-label small fw-semibold">Details (optional)</label>
                    <textarea id="reportText" class="form-control" rows="3" maxlength="500" placeholder="Add context for admins..."></textarea>
                </div>

                <div id="reportError" class="text-danger small mb-2 d-none"></div>
                <div id="reportSuccess" class="text-success small mb-2 d-none"></div>

                <div class="d-flex justify-content-end gap-2">
                    <button id="cancelReportButton" class="btn btn-outline-secondary" type="button">Cancel</button>
                    <button id="submitReportButton" class="btn btn-primary-custom" type="button">Submit Report</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let reportReasons = null;

        function escapeHtml(value) {
            const element = document.createElement('div');
            element.textContent = value || '';
            return element.innerHTML;
        }

        function userProfileLink(userId, label) {
            return `<a href="user-profile.html?userId=${userId}" class="brand-title text-decoration-none">${escapeHtml(label)}</a>`;
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, {
                headers: { "Content-Type": "application/json", ...(options.headers || {}) },
                ...options
            });

            if (response.status === 401 || response.status === 403) {
                window.location.href = "landing.html";
                throw new Error("Unauthorized");
            }

            const text = await response.text();
            const data = text ? JSON.parse(text) : null;

            if (!response.ok) {
                throw new Error(data?.error || "Request failed");
            }

            return data;
        }

        function showReportModal() {
            document.getElementById("reportModal").classList.remove("d-none");
        }

        function hideReportModal() {
            document.getElementById("reportModal").classList.add("d-none");
        }

        function setReportFeedback(errorMessage, successMessage) {
            const errorEl = document.getElementById("reportError");
            const successEl = document.getElementById("reportSuccess");

            errorEl.textContent = errorMessage || "";
            successEl.textContent = successMessage || "";

            errorEl.classList.toggle("d-none", !errorMessage);
            successEl.classList.toggle("d-none", !successMessage);
        }

        function renderReportReasons(reasons) {
            const container = document.getElementById("reportReasonList");

            if (!reasons.length) {
                container.innerHTML = '<p class="text-muted mb-0">No reasons available right now.</p>';
                return;
            }

            container.innerHTML = reasons.map(reason => `
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" value="${reason.id}" id="report-reason-${reason.id}">
                    <label class="form-check-label" for="report-reason-${reason.id}">${escapeHtml(reason.reason_label)}</label>
                </div>
            `).join("");
        }

        async function ensureReportReasons() {
            if (reportReasons) return reportReasons;
            reportReasons = await requestJson("/report-reasons");
            renderReportReasons(reportReasons);
            return reportReasons;
        }

        async function openReportModal(postId) {
            document.getElementById("reportPostId").value = String(postId);
            document.getElementById("reportText").value = "";
            setReportFeedback("", "");
            showReportModal();

            try {
                await ensureReportReasons();
            } catch (err) {
                if (err.message === "Unauthorized") return;
                document.getElementById("reportReasonList").innerHTML = '<p class="text-danger mb-0">Failed to load report reasons.</p>';
                setReportFeedback("You can try again in a moment.", "");
            }
        }

        async function submitPostReport() {
            const postId = Number(document.getElementById("reportPostId").value);
            const reportText = document.getElementById("reportText").value.trim();
            const selectedReasonIds = Array.from(document.querySelectorAll('#reportReasonList input[type="checkbox"]:checked'))
                .map(el => Number(el.value))
                .filter(Number.isInteger);

            if (!Number.isInteger(postId) || postId <= 0) {
                setReportFeedback("Invalid post selected.", "");
                return;
            }

            if (selectedReasonIds.length === 0) {
                setReportFeedback("Select at least one reason.", "");
                return;
            }

            try {
                await requestJson("/report-content", {
                    method: "POST",
                    body: JSON.stringify({
                        content_type: "POST",
                        content_id: postId,
                        reason_ids: selectedReasonIds,
                        report_text: reportText || null
                    })
                });

                setReportFeedback("", "Report submitted.");
                setTimeout(() => hideReportModal(), 700);
            } catch (err) {
                if (err.message === "Unauthorized") return;
                setReportFeedback(err.message || "Failed to submit report.", "");
            }
        }

        async function loadPosts() {
            try {
                const res = await fetch("/posts");
                const posts = await res.json();
                const container = document.getElementById("feed");
                container.innerHTML = "";

                // Fallback if there are no posts at all
                if (!posts || posts.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <p class="text-muted">No activity yet. Try logging a workout or adding friends!</p>
                        </div>`;
                    return;
                }

                posts.forEach(post => {
                    const isLiked = post.user_has_liked > 0;
                    const heartIcon = isLiked ? "❤️" : "🤍";
                    const likeColor = isLiked ? "style='color: #709770; border-color: #709770;'" : "";

                    // Safety: ensure comments is at least an empty array
                    const comments = post.comments || [];

                    const div = document.createElement("div");
                    div.classList.add("card-custom", "mb-4");
                    div.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h4 class="brand-title mb-0">${userProfileLink(post.user_id, post.name)}</h4>
                            <span class="badge rounded-pill bg-light text-dark border">${post.like_count || 0} Likes</span>
                        </div>
                        <p class="fs-5 mb-4">${escapeHtml(post.content)}</p>
                        
                        <div class="d-flex gap-2 mb-4">
                            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" 
                                    ${likeColor} 
                                    onclick="toggleLike(${post.id}, ${isLiked})">
                                ${heartIcon} ${isLiked ? 'Liked' : 'Like'}
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="openReportModal(${post.id})">
                                Report
                            </button>
                        </div>

                        <div class="p-3" style="background: rgba(0,0,0,0.03); border-radius: 12px;">
                            <div class="comment-section">
                                ${comments.length > 0 ? comments.map(c => `
                                    <div class="d-flex justify-content-between align-items-center mb-2 pb-1 border-bottom border-white">
                                        <div class="small">
                                            <strong class="brand-title">${userProfileLink(c.user_id, c.name)}:</strong> 
                                            <span class="text-muted">${escapeHtml(c.comment)}</span>
                                        </div>
                                        <button class="btn btn-sm p-0 px-1 text-danger border-0" 
                                                onclick="deleteComment(${c.id})" 
                                                style="font-size: 1.2rem; line-height: 1;">&times;</button>
                                    </div>
                                `).join("") : '<p class="text-muted small mb-0">No comments yet.</p>'}
                            </div>
                            
                            <div class="input-group mt-3">
                                <input type="text" class="form-control border-0 shadow-none" id="comment-${post.id}" placeholder="Write a comment...">
                                <button class="btn btn-primary-custom px-4" onclick="addComment(${post.id})">Post</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error("Error loading posts:", err);
                document.getElementById("feed").innerHTML = '<p class="text-danger">Error loading feed. Please try again later.</p>';
            }
        }

        async function toggleLike(postId, isLiked) {
            const endpoint = isLiked ? "/unlike" : "/like";
            await requestJson(endpoint, {
                method: "POST",
                body: JSON.stringify({ post_id: postId })
            });
            loadPosts();
        }

        async function deleteComment(commentId) {
            if (!confirm("Delete your comment?")) return;
            try {
                await requestJson("/delete-comment", {
                    method: "POST",
                    body: JSON.stringify({ comment_id: commentId })
                });
            } catch (err) {
                if (err.message === "Unauthorized") return;
                alert(err.message || "You can only delete your own comments!");
            }
            loadPosts();
        }

        async function addComment(postId) {
            const input = document.getElementById(`comment-${postId}`);
            if (!input.value) return;
            await requestJson("/comment", {
                method: "POST",
                body: JSON.stringify({ post_id: postId, comment: input.value })
            });
            input.value = "";
            loadPosts();
        }

        document.getElementById("closeReportModalButton").addEventListener("click", hideReportModal);
        document.getElementById("cancelReportButton").addEventListener("click", hideReportModal);
        document.getElementById("submitReportButton").addEventListener("click", submitPostReport);

        window.openReportModal = openReportModal;
        
        loadPosts();
    </script>
</body>
</html>
