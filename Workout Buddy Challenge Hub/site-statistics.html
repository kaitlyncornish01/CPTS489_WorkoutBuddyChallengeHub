<h2>Site Statistics</h2>

<ul>
    <li id="users"></li>
    <li id="challenges"></li>
    <li id="workouts"></li>
</ul>

<script>
fetch('/admin/stats')
.then(res => res.json())
.then(data => {
    document.getElementById('users').textContent = "Users: " + data.users;
    document.getElementById('challenges').textContent = "Challenges: " + data.challenges;
    document.getElementById('workouts').textContent = "Workouts: " + data.workouts;
});
</script>
