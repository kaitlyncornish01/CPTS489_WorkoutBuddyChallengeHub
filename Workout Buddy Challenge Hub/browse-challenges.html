<!DOCTYPE html>
<html>
<head>
    <title>Browse Challenges - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
        <div class="ms-auto">
            <a class="nav-link d-inline me-3" href="activity-feed.html">Activity</a>
            <a class="nav-link d-inline me-3" href="profile-view.html">Profile</a>
            <a class="nav-link d-inline" href="landing.html">Logout</a>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="brand-title mb-2">Browse Challenges</h2>
        <div class="gold-divider"></div>
        <p class="gold-accent mb-4">Find your next fitness goal</p>

        <div class="row mb-5 g-3">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by challenge name...">
            </div>
            <div class="col-md-3">
                <select id="difficultyFilter" class="form-select">
                    <option value="">All Difficulties</option>
                    <option value="Easy">Beginner</option>
                    <option value="Medium">Intermediate</option>
                    <option value="Hard">Advanced</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="sortOrder" class="form-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
            </div>
        </div>

        <div id="challengeList" class="row g-4">
            </div>
    </div>

    <script>
        let allChallenges = [];

        async function loadChallenges() {
            try {
                const res = await fetch("/challenges");
                allChallenges = await res.json();
                renderChallenges(allChallenges);
            } catch (err) {
                console.error("Error loading challenges:", err);
            }
        }

        function renderChallenges(challenges) {
            const container = document.getElementById("challengeList");
            container.innerHTML = "";

            if (challenges.length === 0) {
                container.innerHTML = `<div class="col-12 text-center mt-5"><p class="text-muted">No challenges found matching your search.</p></div>`;
                return;
            }

            challenges.forEach(challenge => {
                const startDate = new Date(challenge.start_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const endDate = new Date(challenge.end_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                const col = document.createElement("div");
                col.classList.add("col-md-6");

                col.innerHTML = `
                    <div class="card-custom h-100 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="brand-title mb-0">${challenge.title}</h5>
                            <span class="badge rounded-pill bg-light text-dark border px-3">${challenge.difficulty}</span>
                        </div>
                        <p class="text-muted flex-grow-1">${challenge.description}</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <small class="gold-accent text-uppercase" style="font-size: 0.75rem;">
                                ${startDate} — ${endDate}
                            </small>
                            <a href="challenge-details.html?id=${challenge.id}" class="btn btn-primary-custom btn-sm px-4">
                                View Details
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        // Filtering Logic
        function filterChallenges() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const difficulty = document.getElementById("difficultyFilter").value;
            const sort = document.getElementById("sortOrder").value;

            let filtered = allChallenges.filter(c => {
                const matchesSearch = c.title.toLowerCase().includes(searchTerm) || c.description.toLowerCase().includes(searchTerm);
                const matchesDiff = difficulty === "" || c.difficulty === difficulty;
                return matchesSearch && matchesDiff;
            });

            // Sorting
            filtered.sort((a, b) => {
                return sort === "newest" 
                    ? new Date(b.start_date) - new Date(a.start_date)
                    : new Date(a.start_date) - new Date(b.start_date);
            });

            renderChallenges(filtered);
        }

        // Event Listeners
        document.getElementById("searchInput").addEventListener("input", filterChallenges);
        document.getElementById("difficultyFilter").addEventListener("change", filterChallenges);
        document.getElementById("sortOrder").addEventListener("change", filterChallenges);

        loadChallenges();
    </script>
</body>
</html>
