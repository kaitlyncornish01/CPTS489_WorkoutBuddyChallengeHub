<!DOCTYPE html>
<html>
<head>
    <title>Friends List - Workout Buddy</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
    <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="activity-feed.html">Activity</a>

        <div class="col-md-6">

    <div class="row g-4">

            <div class="card-custom">
                <h5 class="brand-title">Bob</h5>
            </div>
        </div>

        <div class="row-md-4">
            <div class="card-custom">
                <h5 class="brand-title">Joe</h5>
            </div>
        </div>

        <div class="row-md-2">
            <div class="card-custom">
                <h5 class="brand-title">Billy</h5>
