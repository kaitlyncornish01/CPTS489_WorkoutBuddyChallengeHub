<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
    <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="activity-feed.html">Activity</a>
        <a class="nav-link d-inline me-3" href="browse-challenges.html">Challenges</a>
        <a class="nav-link d-inline" href="landing.html">Logout</a>
    </div>
</nav>

<div class="container py-5">

    <div class="card-custom">

        <h3 class="brand-title mb-2">Edit Profile</h3>
        <div class="gold-divider"></div>
        <p class="gold-accent mb-4">Update your information and preferences</p>

        <form>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" value="Kaitlyn Cornish">
            </div>

            <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea class="form-control" rows="3">
Staying consistent through accountability and friendly competition.
                </textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Fitness Goals</label>
                <input type="text" class="form-control" value="Run 3x per week">
            </div>

            <div class="mb-4">
                <label class="form-label">Privacy Setting</label>
                <select class="form-select">
                    <option>Public</option>
                    <option>Friends Only</option>
                    <option>Private</option>
                </select>
            </div>

            <div class="d-flex gap-3">
                <button class="btn btn-primary-custom">
                    Save Changes
                </button>
                <a href="profile-view.html" class="btn btn-outline-brown">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
