<!DOCTYPE html>
<html>
<head>
    <title>System Settings - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand brand-title" href="admindashboard.html">Workout Buddy</a>
        </nav>

    <div class="container py-5">
        <h2 class="brand-title mb-4">System Settings</h2>
        <div class="card-custom" style="max-width: 600px;">
            <div class="mb-3">
                <label class="form-label brand-title">Site Name</label>
                <input id="siteName" class="form-control" placeholder="Workout Buddy">
            </div>
            <button onclick="save()" class="btn btn-primary-custom w-100">Save Changes</button>
        </div>
    </div>

    <script>
        function save() {
            const siteName = document.getElementById('siteName').value;
            fetch('/admin/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ site_name: siteName })
            }).then(() => alert("Settings saved successfully!"));
        }
    </script>
</body>
</html>
