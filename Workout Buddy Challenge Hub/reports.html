<!DOCTYPE html>
<html>
<head>
<title>Reports - Workout Buddy</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
	<a class="navbar-brand brand-title" href="admindashboard.html">Workout Buddy</a>
	<div class="ms-auto">
		<a class="nav-link d-inline me-3" href="usermanagement.html">Users</a>
		<a class="nav-link d-inline me-3" href="reports.html">Reports</a>
		<a class="nav-link d-inline me-3" href="platform-activity.html">Activity</a>
		<a class="nav-link d-inline me-3" href="site-statistics.html">Statistics</a>
		<a class="nav-link d-inline me-3" href="system-settings.html">Settings</a>
		<a class="nav-link d-inline" href="landing.html">Logout</a>
	</div>
</nav>

<div class="container py-5">

<div class="mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
	<div>
		<h2 class="brand-title mb-1">Reported Issues</h2>
		<p class="gold-accent mb-0">Review, resolve, or dismiss user reports</p>
	</div>
	<a href="admindashboard.html" class="btn btn-outline-secondary">Back to Dashboard</a>
</div>

<div class="card-custom mb-4">
	<div class="d-flex align-items-center gap-3 flex-wrap">
		<label for="statusFilter" class="fw-semibold mb-0">Status</label>
		<select id="statusFilter" class="form-select" style="max-width: 220px;">
			<option value="ACTIVE" selected>Active</option>
			<option value="IN_REVIEW">In Review</option>
			<option value="RESOLVED">Resolved</option>
			<option value="REJECTED">Rejected</option>
		</select>
		<span class="text-muted small" id="reportCount">0 reports</span>
	</div>
</div>

<div class="table-responsive card-custom">
<table class="table align-middle mb-0">

<thead>
<tr>
<th>Report ID</th>
<th>Reporter</th>
<th>Type</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportsBody">
<tr><td colspan="6" class="text-muted">Loading reports...</td></tr>
</tbody>

</table>
</div>

<div class="modal fade" id="reportActionModal" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="actionModalTitle">Update Report</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<input type="hidden" id="modalReportId">
				<input type="hidden" id="modalActionType">
				<div class="mb-3">
					<label for="adminNotes" class="form-label">Admin Notes (optional)</label>
					<textarea id="adminNotes" class="form-control" rows="4" placeholder="Add context for this action..."></textarea>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
				<button type="button" class="btn btn-primary-custom" id="confirmActionButton">Confirm</button>
			</div>
		</div>
	</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
	const statusFilter = document.getElementById("statusFilter");
	const reportsBody = document.getElementById("reportsBody");
	const reportCount = document.getElementById("reportCount");
	const modalElement = document.getElementById("reportActionModal");
	const actionModal = new bootstrap.Modal(modalElement);

	function mapStatusLabel(statusCode) {
		if (statusCode === "ACTIVE") return "Pending";
		if (statusCode === "IN_REVIEW") return "In Review";
		if (statusCode === "RESOLVED") return "Resolved";
		if (statusCode === "REJECTED") return "Dismissed";
		return statusCode;
	}

	function mapTypeLabel(typeCode) {
		if (typeCode === "POST") return "Post";
		if (typeCode === "COMMENT") return "Comment";
		if (typeCode === "PROFILE") return "Profile";
		return typeCode;
	}

	async function requestJson(url, options = {}) {
		const response = await fetch(url, {
			headers: { "Content-Type": "application/json", ...(options.headers || {}) },
			...options
		});

		if (response.status === 401 || response.status === 403) {
			window.location.href = "landing.html";
			throw new Error("Unauthorized");
		}

		const text = await response.text();
		const data = text ? JSON.parse(text) : null;

		if (!response.ok) {
			throw new Error(data?.error || "Request failed");
		}

		return data;
	}

	function renderRows(reports) {
		if (!reports.length) {
			reportsBody.innerHTML = '<tr><td colspan="6" class="text-muted">No reports found for this status.</td></tr>';
			return;
		}

		const activeView = statusFilter.value === "ACTIVE";

		reportsBody.innerHTML = reports.map(report => `
			<tr>
				<td>#${report.id}</td>
				<td>${report.reporter_name}</td>
				<td>${mapTypeLabel(report.content_type)}</td>
				<td>${report.reasons || "No reason selected"}</td>
				<td>${mapStatusLabel(report.status_code)}</td>
				<td>
					${activeView ? `
						<button class="btn btn-success btn-sm me-2" onclick="openActionModal(${report.id}, 'resolve')">Resolve</button>
						<button class="btn btn-outline-danger btn-sm" onclick="openActionModal(${report.id}, 'dismiss')">Dismiss</button>
					` : '<span class="text-muted small">No actions</span>'}
				</td>
			</tr>
		`).join("");
	}

	async function loadReports() {
		try {
			const reports = await requestJson(`/admin/reports?status=${statusFilter.value}`);
			reportCount.textContent = `${reports.length} report${reports.length === 1 ? "" : "s"}`;
			renderRows(reports);
		} catch (err) {
			if (err.message === "Unauthorized") return;
			reportsBody.innerHTML = '<tr><td colspan="6" class="text-danger">Failed to load reports.</td></tr>';
			console.error("Load reports error:", err);
		}
	}

	function openActionModal(reportId, actionType) {
		document.getElementById("modalReportId").value = reportId;
		document.getElementById("modalActionType").value = actionType;
		document.getElementById("adminNotes").value = "";
		document.getElementById("actionModalTitle").textContent = actionType === "resolve" ? "Resolve Report" : "Dismiss Report";
		document.getElementById("confirmActionButton").textContent = actionType === "resolve" ? "Resolve" : "Dismiss";
		actionModal.show();
	}

	async function submitAction() {
		const reportId = Number(document.getElementById("modalReportId").value);
		const actionType = document.getElementById("modalActionType").value;
		const adminNotes = document.getElementById("adminNotes").value.trim();

		if (!reportId) return;

		const endpoint = actionType === "resolve" ? `/reports/${reportId}/resolve` : `/reports/${reportId}/dismiss`;

		try {
			await requestJson(endpoint, {
				method: "POST",
				body: JSON.stringify({ admin_notes: adminNotes || null })
			});
			actionModal.hide();
			loadReports();
		} catch (err) {
			alert(err.message || "Failed to update report.");
		}
	}

	document.getElementById("confirmActionButton").addEventListener("click", submitAction);
	statusFilter.addEventListener("change", loadReports);
	loadReports();

	window.openActionModal = openActionModal;
</script>

</body>
</html>
