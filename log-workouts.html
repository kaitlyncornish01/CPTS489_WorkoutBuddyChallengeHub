<!DOCTYPE html>
<html>
<head>
    <title>Log Workout - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
    <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="activity-feed.html">Activity</a>
        <a class="nav-link d-inline me-3" href="browse-challenges.html">Challenges</a>
        <a class="nav-link d-inline me-3" href="profile-view.html">Profile</a>
        <a class="nav-link d-inline" href="landing.html">Logout</a>
    </div>
</nav>

<div class="container py-5">

    <h2 class="brand-title mb-2">Log Workout</h2>
    <div class="gold-divider"></div>
    <p class="gold-accent mb-4">Track your progress and update your challenges</p>

    <div class="card-custom">

        <form>

            <div class="mb-3">
                <label class="form-label">Workout Type</label>
                <select class="form-select">
                    <option>Running</option>
                    <option>Strength Training</option>
                    <option>Cycling</option>
                    <option>HIIT</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Duration (minutes)</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Calories Burned</label>
                    <input type="number" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control">
            </div>

            <div class="mb-4">
                <label class="form-label">Notes (Optional)</label>
                <textarea class="form-control" rows="3"></textarea>
            </div>

            <button class="btn btn-primary-custom btn-lg w-100">
                Submit Workout
            </button>

        </form>

    </div>

</div>

</body>
</html>
