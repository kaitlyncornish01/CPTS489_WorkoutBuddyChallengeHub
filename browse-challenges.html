<!DOCTYPE html>
<html>
<head>
    <title>Browse Challenges - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
    <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="activity-feed.html">Activity</a>
        <a class="nav-link d-inline me-3" href="profile-view.html">Profile</a>
        <a class="nav-link d-inline" href="landing.html">Logout</a>
    </div>
</nav>

<div class="container py-5">

    <h2 class="brand-title mb-2">Browse Challenges</h2>
    <div class="gold-divider"></div>
    <p class="gold-accent mb-4">Find your next fitness goal</p>

    <!-- Search & Filters -->
    <div class="row mb-4 g-3">
        <div class="col-md-6">
            <input type="text" class="form-control" placeholder="Search challenges...">
        </div>
        <div class="col-md-3">
            <select class="form-select">
                <option>Difficulty</option>
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select">
                <option>Sort By</option>
                <option>Newest</option>
                <option>Popular</option>
                <option>Ending Soon</option>
            </select>
        </div>
    </div>

    <!-- Challenge Cards -->
    <div class="row g-4">

        <div class="col-md-6">
            <div class="card-custom">
                <h5 class="brand-title">30 Day Step Challenge</h5>
                <p class="text-muted">Goal: 10,000 steps daily</p>
                <p class="text-muted">Participants: 24</p>
                <a href="challenge-details.html" class="btn btn-primary-custom mt-2">
                    View Details
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card-custom">
                <h5 class="brand-title">Weekly Strength Training</h5>
                <p class="text-muted">Goal: 3 strength workouts per week</p>
                <p class="text-muted">Participants: 18</p>
                <a href="challenge-details.html" class="btn btn-primary-custom mt-2">
                    View Details
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
