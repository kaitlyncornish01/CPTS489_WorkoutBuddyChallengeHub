<!DOCTYPE html>
<html>
<head>
    <title>Login - Workout Buddy Challenge Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="login-card w-100" style="max-width: 420px;">

        <div class="text-center mb-4">
            <h2 class="brand-title">Workout Buddy</h2>
            <h5 class="gold-accent">Challenge Hub</h5>
        </div>

        <h4 class="text-center mb-4">Welcome Back</h4>

        <form>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter your password">
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input">
                <label class="form-check-label">Remember Me</label>
            </div>

            <button class="btn btn-primary-custom w-100 py-2">Log In</button>

        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Don't have an account?</span>
            <a href="register.html">Create one</a>
        </div>

    </div>

</div>

</body>
</html>
