<!DOCTYPE html>
<html>
<head>
    <title>Register - Workout Buddy Challenge Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="form-card w-100" style="max-width: 480px;">

        <div class="text-center mb-4">
            <h2 class="brand-title">Workout Buddy</h2>
            <h5 class="gold-accent">Challenge Hub</h5>
        </div>

        <h4 class="text-center mb-4">Create Your Account</h4>

        <form>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create a password">
                <div class="subtext mt-1">
                    Must be at least 8 characters.
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Re-enter password">
            </div>

            <button class="btn btn-primary-custom w-100 py-2">
                Create Account
            </button>

        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Already have an account?</span>
            <a href="login.html">Log in</a>
        </div>

    </div>

</div>

</body>
</html>
