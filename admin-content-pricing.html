<!doctype html>
<html>
  <head>
    <title>Content Pricing Management - Workout Buddy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
      <a class="navbar-brand brand-title" href="admindashboard.html"
        >Workout Buddy</a
      >
      <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="usermanagement.html">Users</a>
        <a class="nav-link d-inline me-3" href="challenge-management.html"
          >Challenges</a
        >
        <a class="nav-link d-inline me-3" href="admin-content-pricing.html"
          >Content</a
        >
        <a class="nav-link d-inline me-3" href="admin-bundle-management.html"
          >Bundles</a
        >
        <a class="nav-link d-inline me-3" href="report-management.html"
          >Reports</a
        >
        <a class="nav-link d-inline" href="landing.html">Logout</a>
      </div>
    </nav>

    <div class="container py-5">
      <div class="mb-4">
        <h2 class="brand-title mb-2">Content Pricing Management</h2>
        <div class="gold-divider mb-3"></div>
        <p class="gold-accent">
          Manage pricing for all trainer content on the platform
        </p>
      </div>

      <!-- Search & Filter -->
      <div class="row mb-4 g-3">
        <div class="col-md-6">
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Search content..."
          />
        </div>
        <div class="col-md-3">
          <select class="form-select" id="pricingFilter">
            <option value="">All Types</option>
            <option value="free">Free</option>
            <option value="paid">Paid</option>
            <option value="tip">Tip-Based</option>
          </select>
        </div>
        <div class="col-md-3">
          <button
            class="btn btn-primary-custom w-100"
            onclick="filterContent()"
          >
            Filter
          </button>
        </div>
      </div>

      <!-- Content List -->
      <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="brand-title mb-0">
            All Content
            <span class="text-muted" style="font-size: 0.9rem"
              >(<span id="contentCount">0</span> items)</span
            >
          </h5>
        </div>
        <div id="contentList"></div>
      </div>
    </div>

    <script>
      let allContent = [];
      let filteredContent = [];

      async function loadContent() {
        try {
          const res = await fetch("/admin/content-pricing");
          if (!res.ok)
            throw new Error(`Failed to load content (${res.status})`);
          allContent = await res.json();
          filteredContent = allContent;
          renderContent();
        } catch (err) {
          console.error(err);
          document.getElementById("contentList").innerHTML =
            '<p class="text-danger">Failed to load content. Check console.</p>';
        }
      }

      function renderContent() {
        const container = document.getElementById("contentList");
        container.innerHTML = "";
        document.getElementById("contentCount").textContent =
          filteredContent.length;

        if (filteredContent.length === 0) {
          container.innerHTML =
            '<p class="text-muted">No content available.</p>';
          return;
        }

        filteredContent.forEach((content) => {
          const priceDisplay =
            content.pricing_type === "free"
              ? "Free"
              : content.pricing_type === "tip"
                ? "Tip-Based"
                : `$${parseFloat(content.price).toFixed(2)}`;

          const card = document.createElement("div");
          card.className = "mb-3 p-3";
          card.style.backgroundColor = "#f0ede8";
          card.style.borderRadius = "10px";
          card.innerHTML = `
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                    <div>
                        <h6 class="mb-1">${content.title}</h6>
                        <p class="text-muted mb-1" style="font-size:0.9rem;">${content.description}</p>
                        <small class="text-muted">Current: ${priceDisplay}</small>
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-outline-secondary btn-sm" onclick="editContent(${content.id})">Edit</button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteContent(${content.id})">Remove</button>
                    </div>
                </div>
            `;
          container.appendChild(card);
        });
      }

      function filterContent() {
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const type = document.getElementById("pricingFilter").value;

        filteredContent = allContent.filter((content) => {
          const matchSearch =
            !search ||
            content.title.toLowerCase().includes(search) ||
            content.description.toLowerCase().includes(search);
          const matchType = !type || content.pricing_type === type;
          return matchSearch && matchType;
        });

        renderContent();
      }

      function editContent(contentId) {
        const content = allContent.find((c) => c.id === contentId);
        if (!content) return;

        const pricing = prompt(
          "Select pricing type:\n1. free\n2. paid\n3. tip",
          content.pricing_type,
        );
        if (!pricing) return;

        let price = 0;
        if (pricing === "paid") {
          price = parseFloat(prompt("Enter price ($):", content.price || 0));
          if (isNaN(price)) return;
        }

        updatePricing(contentId, pricing, price);
      }

      async function updatePricing(contentId, pricingType, price) {
        try {
          const res = await fetch(`/admin/content-pricing/${contentId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pricing_type: pricingType, price }),
          });
          if (!res.ok) throw new Error("Update failed");
          await loadContent();
        } catch (err) {
          console.error(err);
          alert("Could not update pricing.");
        }
      }

      async function deleteContent(contentId) {
        if (!confirm("Remove this content from the platform?")) return;
        try {
          const res = await fetch(`/admin/content/${contentId}`, {
            method: "DELETE",
          });
          if (!res.ok) throw new Error("Delete failed");
          await loadContent();
        } catch (err) {
          console.error(err);
          alert("Could not remove content.");
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("searchInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") filterContent();
          });
        loadContent();
      });
    </script>
  </body>
</html>
