<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Activity - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .activity-card {
            background-color: #f0ede8;
            border-radius: 12px;
            border-left: 6px solid #709770;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .activity-user {
            font-weight: 800;
            color: #5c4a3d;
            font-size: 1.3rem; /* Slightly larger */
            margin-bottom: 4px;
            display: block;
        }
        .activity-content {
            color: #000; /* Pure black for readability */
            font-size: 1.15rem;
            font-weight: 500;
            margin-bottom: 0;
        }
        .activity-time {
            font-size: 0.95rem;
            color: #777;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand brand-title" href="admindashboard.html">Workout Buddy</a>
        <div class="ms-auto">
            <a class="nav-link d-inline me-3" href="usermanagement.html">Users</a>
            <a class="nav-link d-inline me-3" href="report-management.html">Reports</a>
            <a class="nav-link d-inline me-3 active" href="platform-activity.html">Activity</a>
            <a class="nav-link d-inline me-3" href="site-statistics.html">Statistics</a>
            <a class="nav-link d-inline me-3" href="system-settings.html">Settings</a>
            <a class="nav-link d-inline" href="landing.html">Logout</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-5">
            <h2 class="brand-title">Platform Activity</h2>
            <div class="gold-divider"></div>
            <p class="gold-accent">Live administrative feed of all user updates</p>
        </div>

        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div id="activityList">
                    <div class="text-center py-5">
                        <p class="text-muted">Loading live activity feed...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadActivity() {
            const list = document.getElementById('activityList');
            try {
                const res = await fetch('/admin/activity');
                const data = await res.json();
                list.innerHTML = "";

                if (data.length === 0) {
                    list.innerHTML = `<div class="card-custom text-center py-5"><p class="text-muted">No activity recorded.</p></div>`;
                    return;
                }

                data.forEach(post => {
                    const date = new Date(post.created_at).toLocaleString('en-US', { 
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                    });
                    
                    const item = document.createElement('div');
                    item.className = "activity-card";
                    
                    // Display the name from the DB, otherwise fallback
                    const userDisplay = post.username ? post.username : `User #${post.user_id}`;

                    item.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="activity-user">${userDisplay}</span>
                                <p class="activity-content">${post.content}</p>
                            </div>
                            <div class="text-end">
                                <span class="activity-time">${date}</span>
                            </div>
                        </div>`;
                    list.appendChild(item);
                });
            } catch (err) {
                list.innerHTML = `<p class="text-danger text-center py-5">Unable to load feed. Check server.js</p>`;
            }
        }

        loadActivity();
    </script>
</body>
</html>
