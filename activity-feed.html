<!DOCTYPE html>
<html>
<head>
    <title>Activity Feed - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand brand-title" href="dashboard.html">Workout Buddy</a>
    <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="browse-challenges.html">Challenges</a>
        <a class="nav-link d-inline me-3" href="profile-view.html">Profile</a>
        <a class="nav-link d-inline" href="landing.html">Logout</a>
    </div>
</nav>

<div class="container py-5">

    <h2 class="brand-title mb-2">Activity Feed</h2>
    <div class="gold-divider"></div>
    <p class="gold-accent mb-4">See what your friends are accomplishing</p>

    <!-- Post -->
    <div class="card-custom mb-4">
        <h6 class="brand-title">Sarah completed a 5K Run</h6>
        <p class="text-muted mb-2">Distance: 3.1 miles • Time: 28 minutes</p>

        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline-brown btn-sm">Like (12)</button>
        </div>

        <div class="mb-2">
            <input type="text" class="form-control" placeholder="Write a comment...">
        </div>

        <button class="btn btn-primary-custom btn-sm">Post Comment</button>
    </div>

    <!-- Post -->
    <div class="card-custom">
        <h6 class="brand-title">Michael logged a Strength Workout</h6>
        <p class="text-muted mb-2">45 minutes • Upper Body Focus</p>

        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline-brown btn-sm">Like (8)</button>
        </div>

        <div class="mb-2">
            <input type="text" class="form-control" placeholder="Write a comment...">
        </div>

        <button class="btn btn-primary-custom btn-sm">Post Comment</button>
    </div>

</div>

</body>
</html>
