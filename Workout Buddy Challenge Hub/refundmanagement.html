<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Management - Workout Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .btn-primary-custom {
            background-color: #709770;
            border: none;
            color: white;
            transition: 0.3s;
        }
        .btn-primary-custom:hover {
            background-color: #5c7c5c;
            color: white;
        }
        .btn-deny {
            background-color: #dc3545;
            color: white;
            border: none;
            transition: 0.3s;
        }
        .btn-deny:hover {
            background-color: #a71d2a;
            color: white;
        }
        .refund-card {
            background-color: #f0ede8;
            border-radius: 10px;
            border-left: 5px solid #e6bf4d;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .refund-label {
            font-weight: 800;
            color: #5c4a3d;
            font-size: 1.1rem;
            margin-right: 8px;
        }
        .refund-value {
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .amount-text {
            color: #709770; /* Green for currency */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand brand-title" href="admindashboard.html">Workout Buddy</a>
        <div class="ms-auto">
            <a class="nav-link d-inline me-3" href="usermanagement.html">Users</a>
            <a class="nav-link d-inline me-3" href="report-management.html">Reports</a>
            <a class="nav-link d-inline me-3" href="platform-activity.html">Activity</a>
            <a class="nav-link d-inline me-3" href="site-statistics.html">Statistics</a>
            <a class="nav-link d-inline me-3" href="system-settings.html">Settings</a>
            <a class="nav-link d-inline" href="landing.html">Logout</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-5">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="brand-title">Refund Requests</h2>
                <span class="badge bg-warning text-dark p-2" id="refundCount">0 Pending Requests</span>
            </div>
            <div class="gold-divider"></div>
            <p class="gold-accent">Financial oversight and transaction reversals</p>
        </div>

        <div id="refundList">
            <div class="text-center py-5 card-custom">
                <p class="text-muted">Syncing with transaction server...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadRefunds() {
            const container = document.getElementById('refundList');
            const countBadge = document.getElementById('refundCount');

            try {
                const response = await fetch('/admin/refunds');
                if (!response.ok) throw new Error("Connection Error");

                const refunds = await response.json();
                container.innerHTML = ""; 
                countBadge.innerText = `${refunds.length} Pending Requests`;

                if (refunds.length === 0) {
                    container.innerHTML = `
                        <div class="card-custom text-center py-5">
                            <p class="text-muted mb-0">No pending refund requests found.</p>
                        </div>`;
                    return;
                }

                refunds.forEach(refund => {
                    const div = document.createElement('div');
                    div.className = "refund-card";
                    
                    div.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                            <div>
                                <div class="mb-3">
                                    <span class="badge bg-secondary" style="font-size: 0.9rem;">Request ID: #${refund.id}</span>
                                </div>
                                
                                <div class="mb-2">
                                    <span class="refund-label">User:</span>
                                    <span class="refund-value">${refund.username || 'User ID: ' + refund.user_id}</span>
                                </div>

                                <div>
                                    <span class="refund-label">Refund Amount:</span>
                                    <span class="refund-value amount-text">$${parseFloat(refund.amount).toFixed(2)}</span>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button onclick="handleAction(${refund.id}, 'approve')" class="btn btn-primary-custom btn-sm px-4">Approve</button>
                                <button onclick="handleAction(${refund.id}, 'deny')" class="btn btn-deny btn-sm px-4">Deny</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });

            } catch (err) {
                container.innerHTML = `
                    <div class="card-custom text-center py-5">
                        <p class="text-danger">Unable to load refunds. Check server connection.</p>
                        <button onclick="loadRefunds()" class="btn btn-sm btn-outline-danger mt-2">Retry</button>
                    </div>`;
            }
        }

        async function handleAction(id, action) {
            if (confirm(`Confirm ${action} for Request #${id}?`)) {
                try {
                    const res = await fetch(`/admin/refunds/${id}/${action}`, { method: 'POST' });
                    if (res.ok) {
                        loadRefunds(); // Refresh UI
                    } else {
                        alert("Error processing transaction.");
                    }
                } catch (err) {
                    alert("Network error.");
                }
            }
        }

        // Initialize on load
        loadRefunds();
    </script>
</body>
</html>
